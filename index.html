<!doctype html>
<html lang="en">
  <head>
    <title>XR Tutorial - Pinch, Drag & Scale</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <link type="text/css" rel="stylesheet" href="https://xrblocks.github.io/css/xr.css" />
    
    <!-- PWA 앱 설치를 위한 Manifest 및 Service Worker 연결 (복구됨) -->
    <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('./sw.js').then(function(registration) {
            console.log('ServiceWorker registration successful');
          }).catch(function(err) {
            console.log('ServiceWorker registration failed: ', err);
          });
        });
      }
    </script>

    <script>
      window.litDisableBundleWarning = true;
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
          "troika-three-text": "https://cdn.jsdelivr.net/gh/protectwise/troika@028b81cf308f0f22e5aa8e78196be56ec1997af5/packages/troika-three-text/src/index.js",
          "troika-three-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-three-utils/src/index.js",
          "troika-worker-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-worker-utils/src/index.js",
          "bidi-js": "https://esm.sh/bidi-js@^1.0.2?target=es2022",
          "webgl-sdf-generator": "https://esm.sh/webgl-sdf-generator@1.1.1/es2022/webgl-sdf-generator.mjs",
          "lit": "https://cdn.jsdelivr.net/gh/lit/dist@3/core/lit-core.min.js",
          "lit/": "https://esm.run/lit@3/",
          "xrblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.10.0/build/xrblocks.js",
          "xrblocks/addons/": "https://cdn.jsdelivr.net/npm/xrblocks@0.10.0/build/addons/"
        }
      }
    </script>
  </head>

  <body>
    <script type="module">
      import * as THREE from 'three';
      import * as xb from 'xrblocks';
      import { Text } from 'troika-three-text';
      import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';

      /**
       * 부드러운 전환을 위한 이징(Easing) 함수 (Smoothstep 곡선)
       */
      function easeInOut(t) {
        const x = Math.max(0.0, Math.min(1.0, t));
        return x * x * (3.0 - 2.0 * x);
      }

      class XRTutorialScript extends xb.Script {
        init() {
          // 1. 하프 패스스루 환경 구성 (더 어둡게 만들기 위해 depthWrite 비활성화 등 최적화)
          this.dimmingSphere = new THREE.Mesh(
            new THREE.SphereGeometry(10, 32, 32),
            new THREE.MeshBasicMaterial({
              color: 0x000000,
              transparent: true,
              opacity: 0.0, 
              side: THREE.BackSide,
              depthWrite: false
            })
          );
          this.add(this.dimmingSphere);

          // 1.5. 레이캐스트(핸드 레이저) 거리 제한용 투명 받침대 (Depth Catcher)
          // 손가락이 구슬을 빗겨나갔을 때 레이저가 무한대 공간으로 날아가는 현상을 방지합니다.
          // 사용자 반경(구슬보다 20cm 뒤)에 완벽히 투명한 구체를 둘러서, 레이저가 항상 구슬 근처 깊이에서 멈추도록 원근감을 교정합니다.
          this.rayCatcher = new THREE.Mesh(
            new THREE.SphereGeometry(xb.core.user.objectDistance + 0.2, 32, 32),
            new THREE.MeshBasicMaterial({
              colorWrite: false, // 화면에 그리지 않음 (완벽한 투명)
              depthWrite: false,
              side: THREE.BackSide // 안쪽에서 레이저를 맞아야 하므로 BackSide
            })
          );
          this.rayCatcher.position.set(0, xb.core.user.height, 0); // 사용자 시야 중심에 배치
          this.add(this.rayCatcher);

          // 2. 조명 설정
          this.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2.0));
          const dirLight = new THREE.DirectionalLight(0xffffff, 3);
          dirLight.position.set(2, 5, 2);
          this.add(dirLight);

          // 3. 상태 관리 변수 초기화
          this.currentStep = 0; 
          this.stepState = 'PRE_INTRO_DELAY'; 
          this.taskCount = 0; 
          
          this.activeObject = null;
          this.innerRing = null;
          this.objectState = 'NONE'; 
          this.animTimer = 0;
          this.popStartScale = 1.0; 
          this.baseY = 0; 
          this.floatingTimer = 0; 
          
          this.draggingController = null;
          this.pinchingControllers = []; 
          this.isScaling = false;
          this.hasScaled = false;
          this.initialPinchDistance = 0;
          this.initialObjectScale = 1.0;

          this.audioCtx = null;

          // 4. UI 텍스트 설정
          this.setupTexts();
        }

        playPopSound() {
          if (!this.audioCtx) {
            this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          }
          if (this.audioCtx.state === 'suspended') {
            this.audioCtx.resume();
          }

          const t = this.audioCtx.currentTime;
          const oscillator = this.audioCtx.createOscillator();
          const gainNode = this.audioCtx.createGain();

          oscillator.type = 'sine';
          oscillator.frequency.setValueAtTime(800, t);
          oscillator.frequency.exponentialRampToValueAtTime(200, t + 0.15);

          gainNode.gain.setValueAtTime(1.0, t);
          gainNode.gain.exponentialRampToValueAtTime(0.01, t + 0.15);

          oscillator.connect(gainNode);
          gainNode.connect(this.audioCtx.destination);
          
          oscillator.start(t);
          oscillator.stop(t + 0.15);
        }

        setupTexts() {
          const fontUrl = 'https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/packages/pretendard/dist/web/static/woff/Pretendard-Regular.woff';
          
          const createInstructionText = (content) => {
            const txt = new Text();
            txt.text = content;
            txt.fontSize = 0.035;
            txt.color = 0xcccccc;
            txt.anchorX = 'center';
            txt.anchorY = 'middle';
            txt.textAlign = 'center'; 
            txt.font = fontUrl;
            txt.position.set(0, xb.core.user.height + 0.3, -xb.core.user.objectDistance);
            txt.sync();
            txt.visible = false;
            this.add(txt);
            return txt;
          };

          this.instTextStep1 = createInstructionText("핀치 기능을 익혀볼께요,\n버블을 바라보고 엄지와 검지를 한번 맞닿아보세요");
          this.instTextStep2 = createInstructionText("드래그 기능을 익혀볼께요,\n버블을 바라보고 '핀치'를 유지한 상태로 이리저리 움직여보세요");
          this.instTextStep3 = createInstructionText("다음은 크기변환이에요,\n양 손으로 화면에 보이는 버블을 핀치한 상태에서\n두 손을 벌렸다가 모아보세요");

          this.completionText = new Text();
          this.completionText.fontSize = 0.05;
          this.completionText.color = 0xffffff;
          this.completionText.anchorX = 'center';
          this.completionText.anchorY = 'middle';
          this.completionText.textAlign = 'center';
          this.completionText.lineHeight = 1.5;
          this.completionText.fillOpacity = 0.0;
          this.completionText.font = fontUrl;
          this.completionText.visible = false;
          this.completionText.position.set(0, xb.core.user.height + 0.15, -xb.core.user.objectDistance);
          this.add(this.completionText);
        }

        spawnObject() {
          const maxTasks = this.currentStep === 1 ? 5 : (this.currentStep === 2 ? 3 : 2);
          if (this.taskCount >= maxTasks) return;
          
          let geometry;
          if (this.currentStep === 1) {
            geometry = new THREE.SphereGeometry(0.08, 32, 32); 
          } else if (this.currentStep === 2) {
            geometry = new THREE.CapsuleGeometry(0.06, 0.12, 16, 32); 
          } else if (this.currentStep === 3) {
            geometry = new RoundedBoxGeometry(0.16, 0.16, 0.06, 4, 0.02);
            this.pinchingControllers = [];
            this.isScaling = false;
            this.hasScaled = false;
          }
          
          const randomHue = Math.random(); 
          const shellColor = new THREE.Color().setHSL(randomHue, 1.0, 0.4);
          const glowColor = new THREE.Color().setHSL(randomHue, 1.0, 0.6);
          const ringColor = new THREE.Color().setHSL(randomHue, 0.9, 0.7);

          const shellMaterial = new THREE.MeshPhysicalMaterial({
            color: shellColor, 
            metalness: 0.1,
            roughness: 0.05,
            transmission: 0.95, 
            thickness: 0.5,     
            ior: 1.5,           
            transparent: true,
            opacity: 1.0,
            side: THREE.DoubleSide
          });
          
          this.activeObject = new THREE.Mesh(geometry, shellMaterial);
          
          const coreMaterial = new THREE.MeshBasicMaterial({
            color: 0xffffff, 
          });
          const core = new THREE.Mesh(geometry, coreMaterial);
          core.scale.set(0.15, 0.15, 0.15); 
          this.activeObject.add(core);

          const glowMaterial = new THREE.MeshBasicMaterial({
            color: glowColor, 
            transparent: true,
            opacity: 0.6,
            blending: THREE.AdditiveBlending, 
            depthWrite: false
          });
          const glow = new THREE.Mesh(geometry, glowMaterial);
          glow.scale.set(0.4, 0.4, 0.4);
          this.activeObject.add(glow);

          const ringGeo = new THREE.CylinderGeometry(1.0, 1.0, 0.1, 32, 1, true);
          const ringMat = new THREE.MeshBasicMaterial({
            color: ringColor, 
            transparent: true,
            opacity: 0.4,
            blending: THREE.AdditiveBlending,
            side: THREE.DoubleSide,
            depthWrite: false
          });
          this.innerRing = new THREE.Mesh(ringGeo, ringMat);
          
          let ringScale = 0.095;
          if (this.currentStep === 1) ringScale = 0.095;
          else if (this.currentStep === 2) ringScale = 0.08;
          else if (this.currentStep === 3) ringScale = 0.12;
          
          this.innerRing.scale.set(ringScale, ringScale, ringScale);
          this.activeObject.add(this.innerRing);

          const randomX = (Math.random() - 0.5) * 0.8;
          const randomY = xb.core.user.height - 0.15 + (Math.random() - 0.5) * 0.4;
          const fixedZ = -xb.core.user.objectDistance;

          this.baseY = randomY;
          this.floatingTimer = 0;

          this.activeObject.position.set(randomX, randomY, fixedZ);
          this.activeObject.scale.set(0, 0, 0); 

          if (this.currentStep === 2) {
            this.activeObject.rotation.z = Math.random() * Math.PI * 2;
          }

          this.add(this.activeObject);

          this.objectState = 'SPAWNING';
          this.animTimer = 0;
        }

        onSelectStart(event) {
          if (this.stepState !== 'PLAYING' || !this.activeObject || this.objectState === 'SPAWNING' || this.objectState === 'POPPING') return;

          const controller = event.target;
          
          // [수정 포인트 2] 하이브리드 레이캐스트 (시선 + 핸드)
          // 1. 먼저 핸드 트래킹(컨트롤러)을 기준으로 객체를 가리켰는지 확인합니다.
          let intersection = xb.core.user.select(this.activeObject, controller);
          
          // 2. 만약 손으로 가리키지 않았다면 -> 시선(카메라 중앙)으로 쳐다보고 있는지 추가로 검사합니다!
          if (!intersection) {
            const camera = xb.core.camera;
            const raycaster = new THREE.Raycaster();
            
            // [핵심 수정] WebXR 양안 카메라 환경에서 오작동하는 setFromCamera 대신,
            // 기기(헤드셋)의 정확한 3D 월드 위치와 정면 방향(벡터)을 직접 추출하여 레이저를 발사합니다.
            const headPosition = new THREE.Vector3();
            const headDirection = new THREE.Vector3();
            camera.getWorldPosition(headPosition);
            camera.getWorldDirection(headDirection);
            
            raycaster.set(headPosition, headDirection);
            
            const intersects = raycaster.intersectObject(this.activeObject, true);
            if (intersects.length > 0) {
              intersection = intersects[0];
            }
          }

          if (intersection) {
            if (this.currentStep === 1) {
              this.objectState = 'POPPING';
              this.popStartScale = this.activeObject.scale.x;
              this.animTimer = 0;
              this.playPopSound(); 
            } else if (this.currentStep === 2) {
              this.objectState = 'DRAGGING';
              this.draggingController = controller;
              controller.attach(this.activeObject);
            } else if (this.currentStep === 3) {
              if (!this.pinchingControllers.includes(controller)) {
                this.pinchingControllers.push(controller);
              }
              if (this.pinchingControllers.length === 2) {
                this.isScaling = true;
                this.initialPinchDistance = this.pinchingControllers[0].position.distanceTo(this.pinchingControllers[1].position);
                this.initialObjectScale = this.activeObject.scale.x;
              }
            }
          }
        }

        onSelectEnd(event) {
          if (this.stepState !== 'PLAYING' || !this.activeObject) return;

          const controller = event.target;

          if (this.currentStep === 2 && this.objectState === 'DRAGGING') {
            if (controller === this.draggingController) {
              this.add(this.activeObject);
              this.draggingController = null;
              this.objectState = 'POPPING';
              this.popStartScale = this.activeObject.scale.x;
              this.animTimer = 0;
              this.playPopSound(); 
            }
          } else if (this.currentStep === 3) {
            const index = this.pinchingControllers.indexOf(controller);
            if (index > -1) {
              this.pinchingControllers.splice(index, 1);
            }

            if (this.pinchingControllers.length < 2) {
              this.isScaling = false;
            }

            if (this.pinchingControllers.length === 0) {
              if (this.hasScaled) {
                this.objectState = 'POPPING';
                this.popStartScale = this.activeObject.scale.x;
                this.animTimer = 0;
                this.playPopSound(); 
              }
            }
          }
        }

        update() {
          // [수정 포인트 1] 사용자가 기기에서 Enter XR 버튼을 눌러 실제 XR 세션에 진입하기 전까지는 업데이트 로직(타이머)을 완전히 멈춥니다.
          if (!xb.core.renderer.xr.isPresenting) return;

          const dt = Math.min(xb.getDeltaTime(), 0.05);

          // --------------------------------------------------
          // 0단계: 앱 시작 인트로 시퀀스
          // --------------------------------------------------
          if (this.currentStep === 0) {
            this.animTimer += dt;
            
            if (this.stepState === 'PRE_INTRO_DELAY') {
              if (this.animTimer >= 1.0) {
                this.stepState = 'INTRO_DIMMING';
                this.animTimer = 0;
              }
            }
            else if (this.stepState === 'INTRO_DIMMING') {
              // [수정 포인트 3] 패스스루 환경을 훨씬 더 어둡게! (최대 투명도 0.7 -> 0.95로 상향)
              this.dimmingSphere.material.opacity = Math.min(0.95, easeInOut(this.animTimer / 1.0) * 0.95);
              
              if (this.animTimer >= 1.0) {
                this.stepState = 'INTRO_GAP1';
                this.animTimer = 0;
                
                this.completionText.text = "XR의 세상에 오신걸 환영합니다";
                this.completionText.fillOpacity = 0.0;
                this.completionText.visible = false;
                this.completionText.sync();
              }
            } 
            else if (this.stepState === 'INTRO_GAP1') {
              if (this.animTimer >= 0.5) {
                this.stepState = 'INTRO_TEXT1_IN';
                this.animTimer = 0;
                this.completionText.visible = true; 
              }
            }
            else if (this.stepState === 'INTRO_TEXT1_IN') {
              this.completionText.fillOpacity = Math.min(1.0, easeInOut(this.animTimer / 1.0));
              if (this.animTimer >= 1.0) {
                this.stepState = 'INTRO_TEXT1_VIS';
                this.animTimer = 0;
              }
            } 
            else if (this.stepState === 'INTRO_TEXT1_VIS') {
              if (this.animTimer >= 2.0) {
                this.stepState = 'INTRO_TEXT1_OUT';
                this.animTimer = 0;
              }
            } 
            else if (this.stepState === 'INTRO_TEXT1_OUT') {
              this.completionText.fillOpacity = Math.max(0.0, 1.0 - easeInOut(this.animTimer / 1.0));
              if (this.animTimer >= 1.0) {
                this.stepState = 'INTRO_GAP2';
                this.animTimer = 0;
                
                this.completionText.text = "XR의 가장 기본적인 조작법을 익혀볼게요";
                this.completionText.fillOpacity = 0.0;
                this.completionText.visible = false;
                this.completionText.sync();
              }
            }
            else if (this.stepState === 'INTRO_GAP2') {
              if (this.animTimer >= 0.5) {
                this.stepState = 'INTRO_TEXT2_IN';
                this.animTimer = 0;
                this.completionText.visible = true; 
              }
            }
            else if (this.stepState === 'INTRO_TEXT2_IN') {
              this.completionText.fillOpacity = Math.min(1.0, easeInOut(this.animTimer / 1.0));
              if (this.animTimer >= 1.0) {
                this.stepState = 'INTRO_TEXT2_VIS';
                this.animTimer = 0;
              }
            }
            else if (this.stepState === 'INTRO_TEXT2_VIS') {
              if (this.animTimer >= 2.0) {
                this.stepState = 'INTRO_TEXT2_OUT';
                this.animTimer = 0;
              }
            }
            else if (this.stepState === 'INTRO_TEXT2_OUT') {
              this.completionText.fillOpacity = Math.max(0.0, 1.0 - easeInOut(this.animTimer / 1.0));
              if (this.animTimer >= 1.0) {
                this.completionText.visible = false;
                this.stepState = 'INTRO_END_GAP';
                this.animTimer = 0;
              }
            }
            else if (this.stepState === 'INTRO_END_GAP') {
              if (this.animTimer >= 0.5) {
                this.currentStep = 1;
                this.taskCount = 0;
                this.stepState = 'PLAYING';
                this.animTimer = 0;
                this.instTextStep1.visible = true;
                this.spawnObject();
              }
            }
            return; 
          }

          // 내부 홀로그램 링 코어 회전 애니메이션
          if (this.activeObject && this.innerRing) {
            this.innerRing.rotation.y += dt * 0.8;
            this.innerRing.rotation.x += dt * 0.2;
          }

          // --------------------------------------------------
          // 3단계: 두 손 핀치 상태 시 거리 기반 크기 조절 계산
          // --------------------------------------------------
          if (this.currentStep === 3 && this.isScaling && this.pinchingControllers.length === 2) {
            const currentDistance = this.pinchingControllers[0].position.distanceTo(this.pinchingControllers[1].position);
            
            if (this.initialPinchDistance > 0.001) {
              const ratio = currentDistance / this.initialPinchDistance;
              const newScale = this.initialObjectScale * ratio;
              
              this.activeObject.scale.set(newScale, newScale, newScale);
              
              if (Math.abs(ratio - 1.0) > 0.05) {
                this.hasScaled = true;
              }
            }
          }

          // --------------------------------------------------
          // 객체 애니메이션 (생성 및 파괴) 로직
          // --------------------------------------------------
          if (this.stepState === 'PLAYING' && this.activeObject) {
            if (this.objectState === 'SPAWNING') {
              this.animTimer += dt;
              const scale = Math.min(1.0, easeInOut(this.animTimer / 0.2));
              this.activeObject.scale.set(scale, scale, scale);
              
              if (this.animTimer >= 0.2) {
                this.objectState = 'IDLE';
              }
            } else if (this.objectState === 'IDLE') {
              const isBeingHeld = this.currentStep === 3 && this.pinchingControllers.length > 0;
              if (!isBeingHeld) {
                this.floatingTimer += dt;
                const floatOffset = Math.sin(this.floatingTimer * 3.0) * 0.015; 
                this.activeObject.position.y = this.baseY + floatOffset;
              }
            } else if (this.objectState === 'POPPING') {
              this.animTimer += dt;
              const ratio = Math.max(0.0, 1.0 - easeInOut(this.animTimer / 0.2)); 
              const scale = this.popStartScale * ratio;
              this.activeObject.scale.set(scale, scale, scale);

              if (this.animTimer >= 0.2) {
                this.remove(this.activeObject);
                this.activeObject.geometry.dispose();
                this.activeObject.material.dispose();
                this.activeObject = null;
                this.innerRing = null; 
                this.objectState = 'NONE';

                this.taskCount++;

                const maxTasks = this.currentStep === 1 ? 5 : (this.currentStep === 2 ? 3 : 2);
                
                if (this.taskCount < maxTasks) {
                  this.spawnObject();
                } else {
                  this.stepState = 'TEXT_GAP_IN';
                  this.animTimer = 0;
                  
                  if (this.currentStep === 1) {
                    this.instTextStep1.visible = false;
                    this.completionText.text = "잘 하셨습니다,\n핀치는 컴퓨터의 클릭과 같은 기능입니다";
                  } else if (this.currentStep === 2) {
                    this.instTextStep2.visible = false;
                    this.completionText.text = "좋습니다\n핀치한 상태로 손을 움직이면 드래그가 됩니다";
                  } else if (this.currentStep === 3) {
                    this.instTextStep3.visible = false;
                    this.completionText.text = "멋져요!\n두손으로 핀치하고 두손의 간격을 조절해\n화면크기를 키우거나 줄일 수 있습니다";
                  }
                  
                  this.completionText.fillOpacity = 0.0;
                  this.completionText.visible = false;
                  this.completionText.sync();
                }
              }
            }
          }

          // --------------------------------------------------
          // 텍스트 페이드 시퀀스 로직
          // --------------------------------------------------
          if (this.stepState === 'TEXT_GAP_IN') {
            this.animTimer += dt;
            if (this.animTimer >= 0.5) {
              this.stepState = 'TEXT_IN';
              this.animTimer = 0;
              this.completionText.visible = true; 
            }
          }
          else if (this.stepState === 'TEXT_IN') {
            this.animTimer += dt;
            this.completionText.fillOpacity = Math.min(1.0, easeInOut(this.animTimer / 1.0)); 
            
            if (this.animTimer >= 1.0) {
              this.stepState = 'TEXT_VISIBLE';
              this.animTimer = 0;
            }
          } 
          else if (this.stepState === 'TEXT_VISIBLE') {
            this.animTimer += dt;
            if (this.animTimer >= 3.5) { 
              this.stepState = 'TEXT_OUT';
              this.animTimer = 0;
            }
          } 
          else if (this.stepState === 'TEXT_OUT') {
            this.animTimer += dt;
            this.completionText.fillOpacity = Math.max(0.0, 1.0 - easeInOut(this.animTimer / 1.0)); 
            
            if (this.animTimer >= 1.0) {
              this.completionText.visible = false;
              this.stepState = 'TEXT_GAP_OUT';
              this.animTimer = 0;
            }
          }
          else if (this.stepState === 'TEXT_GAP_OUT') {
            this.animTimer += dt;
            if (this.animTimer >= 0.5) {
              if (this.currentStep === 1) {
                this.currentStep = 2;
                this.taskCount = 0;
                this.stepState = 'PLAYING';
                this.instTextStep2.visible = true;
                this.spawnObject();
              } else if (this.currentStep === 2) {
                this.currentStep = 3;
                this.taskCount = 0;
                this.stepState = 'PLAYING';
                this.instTextStep3.visible = true;
                this.spawnObject();
              } else if (this.currentStep === 3) {
                this.currentStep = 4;
                this.stepState = 'TEXT_GAP_IN';
                this.animTimer = 0;
                
                this.completionText.text = "기본 조작방법을 익혔어요!\n이제 XR의 세계로 뛰어들어 볼까요?";
                this.completionText.fillOpacity = 0.0;
                this.completionText.visible = false;
                this.completionText.sync();
              } else if (this.currentStep === 4) {
                this.stepState = 'EXITING';
                this.animTimer = 0;
              }
            }
          }
          // --------------------------------------------------
          // 앱 종료 대기 시퀀스 로직
          // --------------------------------------------------
          else if (this.stepState === 'EXITING') {
            this.animTimer += dt;
            if (this.animTimer >= 1.0) {
              this.stepState = 'DONE';
              
              const session = xb.core.renderer.xr.getSession();
              if (session) {
                session.end();
              } else {
                console.log("튜토리얼 종료 (시뮬레이터 환경)");
              }
            }
          }
        }
      }

      document.addEventListener('DOMContentLoaded', async function () {
        const options = new xb.Options({
          antialias: false,
          stencil: false
        });
        options.enableHands();
        options.hands.visualization = true;
        options.reticles.enabled = true;
        options.setAppTitle('XR Basic Tutorial');
        
        xb.add(new XRTutorialScript());
        await xb.init(options);
      });
    </script>
  </body>
</html>
